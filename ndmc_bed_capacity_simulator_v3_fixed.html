<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>防衛医大 有事病床利用シミュレーター</title>
<style>
:root{--bg:#0b1220;--panel:#121d31;--line:#2b3d5d;--text:#eef4ff;--muted:#9fb0c9;--ok:#54d68c;--warn:#ffc857;--bad:#ff6b6b;--icu:#dc6c6c;--rehab:#54a7d9}
*{box-sizing:border-box} body{margin:0;background:linear-gradient(145deg,#08101c,#101a2c);transition:background .4s ease;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}
body.daymode{background:linear-gradient(145deg,#676b70,#9a9ea3)}
body.nightmode{background:linear-gradient(145deg,#07101d,#11213a)}
header{padding:18px 20px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#0b1220ee;backdrop-filter:blur(10px);z-index:4}
h1{font-size:20px;margin:0 0 10px}.sub{color:var(--muted);font-size:12px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
button,select,input{background:#172640;color:var(--text);border:1px solid #3a5278;border-radius:9px;padding:9px 12px}
button{cursor:pointer;font-weight:700} button.primary{background:#1e63c5} button.danger{background:#8e3540}
main{padding:16px;max-width:1500px;margin:auto}
.kpis{display:grid;grid-template-columns:repeat(8,minmax(120px,1fr));gap:10px;margin-bottom:12px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px}
.kpi b{font-size:22px;display:block}.kpi span{font-size:11px;color:var(--muted)}
.layout{display:grid;grid-template-columns:1fr 330px;gap:12px}
.board{display:grid;grid-template-columns:repeat(3,minmax(220px,1fr));gap:12px}
.ward{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.wardhead{padding:11px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.wardhead h2{font-size:15px;margin:0}.wardmeta{font-size:11px;color:var(--muted)}
.beds{padding:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:7px;min-height:120px}
.bed{min-height:55px;border-radius:9px;border:1px solid #344a6d;background:#162237;padding:6px;font-size:10px;position:relative;cursor:pointer}
.bed.empty{opacity:.38}.bed .id{font-weight:800;font-size:11px}.bed .dx{color:#c5d2e6;margin-top:3px}.tag{position:absolute;right:4px;top:4px;border-radius:10px;padding:2px 5px;font-size:8px;background:#385a87}.tag.rehab{background:#206884}.tag.wait{background:#8b6a1c}.tag.critical{background:#8b3030}
.side{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px;align-self:start;position:sticky;top:126px}
.side h3{margin:0 0 8px;font-size:15px}.eventlog{height:360px;overflow:auto;font-size:11px;color:#c8d5e8}.event{border-bottom:1px solid #263855;padding:7px 0}
.legend{display:flex;gap:8px;flex-wrap:wrap;font-size:10px;color:var(--muted);margin-top:9px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:3px}
.bar{height:7px;background:#263650;border-radius:8px;overflow:hidden;margin-top:5px}.bar>i{display:block;height:100%;background:var(--ok)}
.overlay{position:fixed;inset:0;background:#020611d9;display:none;align-items:center;justify-content:center;z-index:10;padding:16px}
.modal{width:min(920px,100%);max-height:90vh;overflow:auto;background:#101b2f;border:1px solid #40577b;border-radius:16px;padding:18px}
.modalgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.timeline{background:#0b1425;border-radius:10px;padding:12px}
.step{padding:8px;border-left:3px solid #496d9f;margin-bottom:7px;background:#15233a;border-radius:0 8px 8px 0}
.close{float:right}.mini{font-size:11px;color:var(--muted)}
.summaryOk{border-left:5px solid var(--ok);padding:10px 12px;background:#10261d;border-radius:8px}
.summaryWarn{border-left:5px solid var(--warn);padding:10px 12px;background:#2c2511;border-radius:8px}
.summaryBad{border-left:5px solid var(--bad);padding:10px 12px;background:#32171b;border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:12px}th,td{border:1px solid #334968;padding:7px;text-align:left}th{background:#182944}
@media(max-width:980px){.kpis{grid-template-columns:repeat(3,1fr)}.layout{grid-template-columns:1fr}.side{position:static}.board{grid-template-columns:1fr 1fr}}
@media(max-width:620px){.board{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}.modalgrid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<h1>防衛医大 有事病床利用シミュレーター</h1>
<div class="sub">標準：実時間3秒＝シミュレーション3時間 ／ 拡大：実時間1秒＝10分</div>
<div class="toolbar">
<label>ICU早期離床リハ
<select id="icuRehab">
<option value="full">全対象患者で実施</option>
<option value="half">50％のみ実施</option>
<option value="none">実施しない</option>
</select></label>
<label>転院先・後送確保
<select id="transferModel">
<option value="normal">通常確保</option>
<option value="limited">10％のみ確保</option>
</select></label>
<label>ICU臨時拡張
<select id="icuExpansion"><option value="0">なし（11床）</option><option value="5">＋5床（最大16床）</option></select></label>
<label>追加安置室
<select id="morgueExpansion"><option value="0">なし（2床）</option><option value="4">＋4床</option><option value="10">＋10床</option></select></label>
<button class="primary" id="run">▶ 標準進行</button><button id="pause">⏸ 停止</button><button id="step">＋3時間</button><button id="surge">負傷者10名到着</button><button id="summaryBtn">勤務帯サマリー</button><button class="danger" id="reset">初期化</button>
<label>一般病床数 <input id="generalBeds" type="number" value="60" min="20" max="300" style="width:75px"></label>
</div>
</header>
<main>
<section class="kpis">
<div class="kpi"><b id="clock">D1 08:00</b><span>シミュレーション時刻</span></div>
<div class="kpi"><b id="occ">0%</b><span>全病床利用率</span></div>
<div class="kpi"><b id="icuKpi">0 / 11</b><span>ICU使用</span></div>
<div class="kpi"><b id="orKpi">0 / 15</b><span>手術室稼働</span></div>
<div class="kpi"><b id="queueKpi">0</b><span>手術待機</span></div>
<div class="kpi"><b id="blockedKpi">0</b><span>退院・転院待ち</span></div>
<div class="kpi"><b id="morgueKpi">0 / 2</b><span>霊安室・安置室</span></div>
<div class="kpi"><b id="diagKpi">100%</b><span>IVR・CT・MRI・HD余力</span></div>
</section>
<div class="layout">
<section class="board" id="board"></section>
<aside class="side">
<h3>全体の詰まり</h3>
<div id="bottleneck"></div>
<div class="legend"><span><i class="dot" style="background:#54d68c"></i>通常</span><span><i class="dot" style="background:#54a7d9"></i>リハ中</span><span><i class="dot" style="background:#ffc857"></i>移動待ち</span><span><i class="dot" style="background:#ff6b6b"></i>重症</span></div>
<h3 style="margin-top:16px">イベントログ</h3><div class="eventlog" id="log"></div>
</aside>
</div>
</main>

<div class="overlay" id="summaryOverlay"><div class="modal">
<button class="close" id="summaryClose">閉じる</button>
<h2>勤務帯サマリー</h2>
<div id="summaryComment"></div>
<div style="margin:12px 0"><button class="primary" id="downloadCsv">CSVを保存</button></div>
<div id="summaryTable"></div>
</div></div>

<div class="overlay" id="overlay"><div class="modal">
<button class="close" id="close">閉じる</button><h2 id="modalTitle"></h2>
<div class="modalgrid"><div id="patientDetail"></div><div class="timeline"><b>拡大モード</b><p class="mini">画面を開いた時点で全体時間は停止します。「拡大進行」で全院を1秒＝10分で動かします。</p><button class="primary" id="microRun">▶ 拡大進行</button> <button id="microPause">停止</button><div id="patientTimeline"></div></div></div>
</div></div>

<script>
const wardDefs=[
 {id:'ICU',name:'ICU',cap:11,type:'icu'},
 {id:'TRAUMA',name:'外傷・整形病棟',cap:16},
 {id:'BURN',name:'熱傷・形成病棟',cap:10},
 {id:'NEURO',name:'脳外・脊損病棟',cap:12},
 {id:'MED',name:'一般内科病棟',cap:12},
 {id:'REHAB',name:'リハビリ病棟',cap:10},
 {id:'MORGUE',name:'霊安室・安置室',cap:2,type:'morgue'}
];
const dxs=[
 ['爆傷・多発外傷','TRAUMA',72,0.65],['上肢切断','TRAUMA',48,0.35],['下肢切断','TRAUMA',60,0.4],
 ['重症熱傷','BURN',96,0.55],['頭部外傷','NEURO',84,0.45],['頸髄損傷','NEURO',120,0.5],
 ['胸腹部外傷','ICU',54,0.75],['民間救急疾患','MED',36,0.15],['術後呼吸不全','ICU',48,0.8]
];
let state={mins:480,patients:[],orActive:0,orQueue:0,log:[],timer:null,micro:null,selected:null,nextId:1,shiftHistory:[],lastShiftKey:null,diagnostics:{IVR:0,CT:0,MRI:0,HD:0},deaths:0};
function addPatient(forceCritical=false,initialPatient=false){
 const d=dxs[Math.floor(Math.random()*dxs.length)];
 const critical=forceCritical||Math.random()<d[3];
 let ward=critical?'ICU':d[1];
 const p={id:'P'+String(state.nextId++).padStart(3,'0'),dx:d[0],ward,phase:critical?'集中治療':'入院評価',
 remaining:d[2]*60*(.7+Math.random()*.7),rehab:false,transfer:false,discharge:false,
 surgery:Math.random()<.58,opDone:false,critical,progress:0,
 ageMins:0,icuRehabEligible:null,icuRehabStarted:false,dead:false,deathHandled:false,diagnosticNeed:Math.random()<0.55?['CT','MRI','IVR','HD'][Math.floor(Math.random()*4)]:null,diagnosticDone:false,waitedOR:0,initialPatient};
 state.patients.push(p); if(p.surgery) state.orQueue++;
}
function init(){
 clearInterval(state.timer);clearInterval(state.micro);
 state={mins:480,patients:[],orActive:0,orQueue:0,log:[],timer:null,micro:null,selected:null,nextId:1,shiftHistory:[],lastShiftKey:null,diagnostics:{IVR:0,CT:0,MRI:0,HD:0},deaths:0};
 const beds=+document.getElementById('generalBeds').value;
 wardDefs.find(w=>w.id==='MED').cap=Math.max(12,Math.round(beds*.2));
 wardDefs.find(w=>w.id==='TRAUMA').cap=Math.max(16,Math.round(beds*.27));
 wardDefs.find(w=>w.id==='BURN').cap=Math.max(10,Math.round(beds*.16));
 wardDefs.find(w=>w.id==='NEURO').cap=Math.max(12,Math.round(beds*.2));
 wardDefs.find(w=>w.id==='REHAB').cap=Math.max(10,Math.round(beds*.17));
 // 一般病床は一般病床数の80％、ICUは11床の約80％（9床）で開始
 const generalTarget=Math.round(beds*.8);
 let generalAdded=0;
 while(generalAdded<generalTarget){
  const before=state.patients.length;
  addPatient(false,true);
  const p=state.patients[state.patients.length-1];
  if(p.ward==='ICU'){state.patients.pop();state.nextId--;if(p.surgery)state.orQueue--;continue;}
  generalAdded++;
 }
 for(let i=0;i<9;i++) addPatient(true,true);
 state.log.unshift('D1 08:00　一般病床・ICUとも利用率約80%で開始'); updateDayNightTheme(); render();
}
function icuRehabMode(){return document.getElementById('icuRehab').value}
function transferChance(){
 return document.getElementById('transferModel').value==='limited' ? 0.10 : 0.55;
}
function normalAdmissionFactor(){
 return document.getElementById('transferModel').value==='limited' ? 0.10 : 1.0;
}
function capacity(id){if(id==='ICU')return 11+Number(document.getElementById('icuExpansion').value||0);if(id==='MORGUE')return 2+Number(document.getElementById('morgueExpansion').value||0);return wardDefs.find(w=>w.id===id).cap}
function countWard(id){return state.patients.filter(p=>p.ward===id&&!p.discharge).length}
function move(p,to){if(countWard(to)<capacity(to)){p.ward=to;p.transfer=false;return true}p.transfer=true;return false}
function icuCap(){return capacity('ICU')}
function morgueCap(){return capacity('MORGUE')}
function diagCapacity(name){return name==='CT'?2:1}
function diagAvailabilityFactor(){return document.getElementById('transferModel').value==='limited'?0.05:0.45}
function currentShiftIsDay(){const h=(state.mins%1440)/60;return h>=8&&h<20}
function updateDayNightTheme(){document.body.classList.toggle('daymode',currentShiftIsDay());document.body.classList.toggle('nightmode',!currentShiftIsDay())}
function tryMoveDeadToMorgue(p){
 if(countWard('MORGUE')<morgueCap()){p.ward='MORGUE';p.phase='安置中';p.deathHandled=true;log(`${p.id} を霊安室・安置室へ移動`)}
 else{p.phase='死亡・安置待ち';p.deathHandled=false;log(`${p.id} 霊安室満床のため病床占有継続`)}
}
function advance(mins){
 const before=state.mins; state.mins+=mins; updateDayNightTheme();
 const rehabMode=icuRehabMode(),tChance=transferChance();
 const freeOR=Math.max(0,15-state.orActive),icuBlocked=countWard('ICU')>=icuCap();
 const possibleStarts=icuBlocked?Math.max(0,Math.floor(freeOR*.2)):freeOR;
 const starts=Math.min(possibleStarts,state.orQueue,Math.max(1,Math.floor(mins/30)));
 state.orActive+=starts;state.orQueue-=starts;if(starts)log(`${starts}名が手術室へ入室`);
 let finishes=Math.min(state.orActive,Math.floor(mins/50)+(Math.random()<.4?1:0));state.orActive-=finishes;if(finishes)log(`${finishes}件の手術が終了`);
 for(const p of state.patients){
  if(p.discharge)continue;
  if(p.dead){if(!p.deathHandled&&p.ward!=='MORGUE')tryMoveDeadToMorgue(p);continue}
  p.ageMins+=mins;
  if(p.surgery&&!p.opDone){p.waitedOR+=mins;if(p.waitedOR>=720&&Math.random()<0.5*(mins/720)){p.dead=true;p.phase='手術待機中死亡';state.deaths++;tryMoveDeadToMorgue(p);continue}}
  if(p.diagnosticNeed&&!p.diagnosticDone){const n=p.diagnosticNeed;if(Math.random()<diagAvailabilityFactor()*(mins/180)&&state.diagnostics[n]<diagCapacity(n)){state.diagnostics[n]++;p.phase=`${n}検査中`;if(Math.random()<mins/90){p.diagnosticDone=true;state.diagnostics[n]=Math.max(0,state.diagnostics[n]-1);p.phase=p.critical?'集中治療':'入院評価';log(`${p.id} ${n}検査終了`)}}}
  if(p.ward==='ICU'&&p.ageMins<=1440&&!p.icuRehabStarted){if(p.icuRehabEligible===null)p.icuRehabEligible=rehabMode==='full'?true:rehabMode==='half'?Math.random()<.5:false;if(p.icuRehabEligible&&p.ageMins>=360){p.icuRehabStarted=true;p.rehab=true;p.phase='ICU早期離床リハ';log(`${p.id} ICU早期離床リハ開始`)}}
  const rehabGain=p.rehab?(p.ward==='ICU'?1.18:1.35):1;p.remaining-=mins*rehabGain;
  if(p.surgery&&!p.opDone&&p.waitedOR>=180&&Math.random()<mins/300){p.opDone=true;p.phase='術後管理';p.waitedOR=0}
  const minStay=p.ward==='ICU'?7*1440:3*1440;
  if(p.critical&&p.ward==='ICU'&&p.ageMins>=7*1440&&p.remaining<36*60){p.phase='ICU退室判定';if(move(p,p.dx.includes('熱傷')?'BURN':p.dx.includes('頭')||p.dx.includes('髄')?'NEURO':'TRAUMA')){p.critical=false;log(`${p.id} ICUから${p.ward}へ転棟`)}}
  if(!p.critical&&p.remaining<48*60&&!p.rehab){p.rehab=true;p.phase='早期リハビリ'}
  if(p.rehab&&p.ward!=='ICU'&&p.ward!=='REHAB'&&p.ageMins>=3*1440&&p.remaining<24*60){if(move(p,'REHAB'))p.phase='集中的リハビリ'}
  if(p.remaining<=0&&p.ageMins>=minStay){if(Math.random()<tChance*(mins/240)){p.discharge=true;p.phase='後送・退院';log(`${p.id} 後送・退院`)}else{p.remaining=240;p.transfer=true;p.phase='退院・転院待ち'}}
 }
 if(Math.random()<mins/210*normalAdmissionFactor()){addPatient(Math.random()<.45,false);log('新規患者1名を受け入れ')}
 if(countWard('ICU')>=icuCap()&&Math.random()<mins/120){state.orQueue++;log('ICU満床のため術後受入れ待ちが発生')}
 captureShiftCrossings(before,state.mins);render();
}
function shiftKeyAt(mins){
 const day=Math.floor(mins/1440)+1,h=(mins%1440)/60;
 return h>=8&&h<20?`D${day}日勤`:(h<8?`D${day-1}夜勤`:`D${day}夜勤`);
}
function captureShiftCrossings(before,after){
 const beforeKey=shiftKeyAt(before),afterKey=shiftKeyAt(after);
 if(state.lastShiftKey===null)state.lastShiftKey=beforeKey;
 if(afterKey!==beforeKey){
  state.shiftHistory.push(buildSummary(beforeKey));
  state.lastShiftKey=afterKey;
 }
}
function log(s){state.log.unshift(fmtTime()+'　'+s);state.log=state.log.slice(0,100)}
function fmtTime(){let d=Math.floor(state.mins/1440)+1,m=state.mins%1440;return `D${d} ${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`}
function render(){
 document.getElementById('clock').textContent=fmtTime();
 const active=state.patients.filter(p=>!p.discharge);
 const inpatients=active.filter(p=>p.ward!=='MORGUE');
 const cap=wardDefs.filter(w=>w.id!=='MORGUE').reduce((a,w)=>a+capacity(w.id),0);
 document.getElementById('occ').textContent=Math.round(inpatients.length/cap*100)+'%';
 document.getElementById('icuKpi').textContent=`${countWard('ICU')} / ${icuCap()}`;
 document.getElementById('orKpi').textContent=`${state.orActive} / 15`;
 document.getElementById('queueKpi').textContent=state.orQueue;
 const blocked=active.filter(p=>p.transfer).length;document.getElementById('blockedKpi').textContent=blocked;document.getElementById('morgueKpi').textContent=`${countWard('MORGUE')} / ${morgueCap()}`;const diagBusy=Object.values(state.diagnostics).reduce((a,b)=>a+b,0);document.getElementById('diagKpi').textContent=Math.max(0,100-Math.round(diagBusy/5*100))+'%';
 document.getElementById('board').innerHTML=wardDefs.map(w=>{
  const pts=active.filter(p=>p.ward===w.id),beds=[],capNow=capacity(w.id);
  for(let i=0;i<capNow;i++){const p=pts[i];beds.push(p?`<div class="bed" onclick="openPatient('${p.id}')"><span class="id">${p.id}</span>${p.rehab?'<span class="tag rehab">リハ</span>':p.transfer?'<span class="tag wait">待機</span>':p.critical?'<span class="tag critical">重症</span>':''}<div class="dx">${p.dx}</div></div>`:`<div class="bed empty">空床</div>`)}
  const pct=Math.round(pts.length/capNow*100);
  return `<article class="ward"><div class="wardhead"><div><h2>${w.name}</h2><div class="wardmeta">${pts.length}/${capNow}床</div></div><b>${pct}%</b></div><div class="beds">${beds.join('')}</div></article>`
 }).join('');
 const icuPct=countWard('ICU')/icuCap()*100, orPct=state.orActive/15*100, blockPct=Math.min(100,blocked/10*100);
 document.getElementById('bottleneck').innerHTML=`
 <div class="mini">ICU占有</div><div class="bar"><i style="width:${icuPct}%;background:${icuPct>90?'var(--bad)':'var(--ok)'}"></i></div>
 <div class="mini" style="margin-top:10px">手術室稼働</div><div class="bar"><i style="width:${orPct}%"></i></div>
 <div class="mini" style="margin-top:10px">後送・退院滞留</div><div class="bar"><i style="width:${blockPct}%;background:${blocked>5?'var(--bad)':'var(--warn)'}"></i></div>
 <p class="mini">${countWard('ICU')>=icuCap()?'ICU満床により、術後患者を手術室・回復室から出せない危険があります。':countWard('MORGUE')>=morgueCap()?'霊安室・安置室満床のため死亡患者が病床を占有しています。':blocked>5?'後送待ちが病床を塞ぎ、次の傷病者受入れ能力を低下させています。':'現時点で重大なボトルネックはありません。'}</p>`;
 document.getElementById('log').innerHTML=state.log.map(x=>`<div class="event">${x}</div>`).join('');
 if(state.selected) updateModal();
}
function openPatient(id){clearInterval(state.timer);state.timer=null;state.selected=id;document.getElementById('overlay').style.display='flex';updateModal()}
function updateModal(){
 const p=state.patients.find(x=>x.id===state.selected);if(!p)return;
 document.getElementById('modalTitle').textContent=`${p.id}　${p.dx}`;
 document.getElementById('patientDetail').innerHTML=`<h3>${wardDefs.find(w=>w.id===p.ward)?.name||'退院'}</h3>
 <p><b>現在：</b>${p.phase}</p><p><b>重症：</b>${p.critical?'はい':'いいえ'}</p><p><b>手術：</b>${p.surgery?(p.opDone?'終了':'予定・待機'):'不要'}</p>
 <p><b>リハビリ：</b>${p.rehab?'実施中':'未開始'}${p.ward==='ICU'?'（ICU早期離床リハ）':''}</p><p><b>搬送・転棟：</b>${p.transfer?'待機中':'可能'}</p>
 <p><b>退院見込み：</b>${p.dead?'対象外':Math.max(0,Math.round(p.remaining/60))+'時間'}</p><p><b>在院時間：</b>${Math.round(p.ageMins/60)}時間</p><p><b>死亡：</b>${p.dead?'はい':'いいえ'}</p>`;
 document.getElementById('patientTimeline').innerHTML=`<div class="step">${fmtTime()}　${p.phase}</div><div class="step">次段階：${p.critical?'ICU退室判定':p.rehab?'後送・退院判定':'リハビリ開始判定'}</div>`;
}

function buildSummary(label=shiftKeyAt(state.mins)){
 const active=state.patients.filter(p=>!p.discharge);
 const cap=wardDefs.filter(w=>w.id!=='MORGUE').reduce((a,w)=>a+capacity(w.id),0);
 const blocked=active.filter(p=>p.transfer).length;
 const icu=countWard('ICU');
 const freeBeds=cap-active.length;
 const icuFree=icuCap()-icu;
 const rehabICU=active.filter(p=>p.ward==='ICU'&&p.icuRehabStarted).length;
 let level='可能',reasons=[];
 if(icuFree<=0)reasons.push('ICU満床');if(countWard('MORGUE')>=morgueCap())reasons.push('霊安室・安置室満床');const diagBusy=Object.values(state.diagnostics).reduce((a,b)=>a+b,0);if(diagBusy>=4)reasons.push('IVR・CT・MRI・HDの余力不足');
 if(state.orQueue>=5)reasons.push(`手術待機${state.orQueue}名`);
 if(blocked>=5)reasons.push(`退院・転院待ち${blocked}名`);
 if(freeBeds<=2)reasons.push(`全院空床${freeBeds}床`);
 if(reasons.length>=2||icuFree<0||freeBeds<=0)level='困難';
 else if(reasons.length===1||icuFree<=2||freeBeds<=5)level='条件付き';
 const comment=level==='可能'
  ?'次勤務帯も受入可能です。ICU、一般病床、手術室後方病床に重大な詰まりはありません。'
  :level==='条件付き'
  ?`次勤務帯の受入は条件付きです。主因：${reasons.join('、')||'余力が小さい'}。`
  :`次勤務帯の新規受入は困難です。主因：${reasons.join('、')}。後送調整、退院促進、予定入院抑制が必要です。`;
 return {label,time:fmtTime(),level,comment,occupancy:Math.round(active.length/cap*100),active:active.length,capacity:cap,
  freeBeds,icu,icuFree,orActive:state.orActive,orQueue:state.orQueue,blocked,rehabICU,
  transferModel:document.getElementById('transferModel').selectedOptions[0].text,morgue:`${countWard('MORGUE')}/${morgueCap()}`,diagBusy,icuRehabModel:document.getElementById('icuRehab').selectedOptions[0].text};
}
let currentSummary=null;
function showSummary(){
 clearInterval(state.timer);state.timer=null;
 currentSummary=buildSummary();
 const cls=currentSummary.level==='可能'?'summaryOk':currentSummary.level==='条件付き'?'summaryWarn':'summaryBad';
 document.getElementById('summaryComment').innerHTML=`<div class="${cls}"><b>次勤務帯の受入：${currentSummary.level}</b><p>${currentSummary.comment}</p></div>`;
 document.getElementById('summaryTable').innerHTML=`<table>
 <tr><th>勤務帯</th><td>${currentSummary.label}</td><th>時刻</th><td>${currentSummary.time}</td></tr>
 <tr><th>全病床利用率</th><td>${currentSummary.occupancy}%</td><th>全院空床</th><td>${currentSummary.freeBeds}</td></tr>
 <tr><th>ICU</th><td>${currentSummary.icu}/${icuCap()}</td><th>ICU空床</th><td>${currentSummary.icuFree}</td></tr><tr><th>霊安室・安置室</th><td>${currentSummary.morgue}</td><th>検査部門稼働</th><td>${currentSummary.diagBusy}/5</td></tr>
 <tr><th>手術室稼働</th><td>${currentSummary.orActive}/15</td><th>手術待機</th><td>${currentSummary.orQueue}</td></tr>
 <tr><th>後送・転院待ち</th><td>${currentSummary.blocked}</td><th>ICUリハ中</th><td>${currentSummary.rehabICU}</td></tr>
 <tr><th>ICUリハ設定</th><td colspan="3">${currentSummary.icuRehabModel}</td></tr>
 <tr><th>後送設定</th><td colspan="3">${currentSummary.transferModel}</td></tr>
 </table>`;
 document.getElementById('summaryOverlay').style.display='flex';
}
function csvEscape(v){return `"${String(v).replaceAll('"','""')}"`}
function downloadSummaryCsv(){
 const rows=[
 ['勤務帯','時刻','次勤務帯受入判定','コメント','全病床利用率','在院患者数','総病床数','全院空床',
  'ICU使用','ICU空床','手術室稼働','手術待機','退院転院待ち','ICU早期離床リハ中','ICUリハ設定','後送設定'],
 [currentSummary.label,currentSummary.time,currentSummary.level,currentSummary.comment,currentSummary.occupancy,
  currentSummary.active,currentSummary.capacity,currentSummary.freeBeds,currentSummary.icu,currentSummary.icuFree,
  currentSummary.orActive,currentSummary.orQueue,currentSummary.blocked,currentSummary.rehabICU,
  currentSummary.icuRehabModel,currentSummary.transferModel]
 ];
 const csv='\ufeff'+rows.map(r=>r.map(csvEscape).join(',')).join('\n');
 const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
 const a=document.createElement('a');a.href=URL.createObjectURL(blob);
 a.download=`勤務帯サマリー_${currentSummary.label}_${currentSummary.time.replaceAll(':','-').replaceAll(' ','_')}.csv`;
 a.click();URL.revokeObjectURL(a.href);
}
document.getElementById('run').onclick=()=>{clearInterval(state.timer);state.timer=setInterval(()=>advance(180),3000)};
document.getElementById('pause').onclick=()=>{clearInterval(state.timer);state.timer=null};
document.getElementById('step').onclick=()=>advance(180);
document.getElementById('surge').onclick=()=>{for(let i=0;i<10;i++)addPatient(i<4,false);log('一括後送：負傷者10名が到着');render()};
document.getElementById('summaryBtn').onclick=showSummary;
document.getElementById('summaryClose').onclick=()=>document.getElementById('summaryOverlay').style.display='none';
document.getElementById('downloadCsv').onclick=downloadSummaryCsv;
document.getElementById('reset').onclick=init;document.getElementById('generalBeds').onchange=init;
document.getElementById('close').onclick=()=>{clearInterval(state.micro);state.micro=null;state.selected=null;document.getElementById('overlay').style.display='none'};
document.getElementById('microRun').onclick=()=>{clearInterval(state.micro);state.micro=setInterval(()=>advance(10),1000)};
document.getElementById('microPause').onclick=()=>{clearInterval(state.micro);state.micro=null};
init();
</script>
</body></html>
